{% set name = "dask-snowflake" %}
{% set version = "0.3.4" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 0b415ebfc8bc70ab388ea0f47728d1e87559ad3db219ca79ee87e9f8060d68ef

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools_scm
  run:
    - python >={{ python_min }}
    - dask >=2024.3.0
    - pandas
    - pyarrow
    - snowflake-connector-python >=2.6.0
    - snowflake-sqlalchemy
    - sqlalchemy

test:
  imports:
    - dask_snowflake
  requires:
    - pip
    - python {{ python_min }}
  commands:
    - pip check

about:
  home: https://github.com/coiled/dask-snowflake
  license: BSD-3-Clause
  license_family: MIT
  license_file: LICENSE
  summary: Dask integration for Snowflake
  description: |
    Dask integration for Snowflake
  doc_url: https://github.com/coiled/dask-snowflake
  dev_url: https://github.com/coiled/dask-snowflake

extra:
  recipe-maintainers:
    - jrbourbeau
    - fjetter
